<!DOCTYPE html>
<html>
<head>
  <title>DevBlog 🌍</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🚀 DevBlog</h1>
  <p>Share your ideas with the world</p>
</header>

<section class="form-section">
  <h2>Create Blog</h2>
  <input id="title" placeholder="Title" />
  <input id="image" placeholder="Image URL (paste from internet)" />
  <textarea id="content" placeholder="Write your blog..."></textarea>
  <button onclick="createPost()">Publish</button>
</section>

<section id="posts" class="grid"></section>

<script src="script.js"></script>
</body>
</html>
